<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Pedido | Origami Decoprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f3ef;
    --card: #ffffff;
    --accent: #e07010;
    --accent-light: #fff4eb;
    --accent-dark: #b85a0a;
    --text: #1a1a1a;
    --text-2: #5c5c5c;
    --text-3: #9a9a9a;
    --border: rgba(0,0,0,.06);
    --green: #1a9a5c;
    --green-bg: #e8f7ef;
    --shadow-lg: 0 20px 60px rgba(0,0,0,.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', system-ui, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 0%, rgba(224,112,16,.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(224,112,16,.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .brand-header {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1) .1s both;
  }
  .brand-logo {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: inline-grid;
    place-items: center;
    margin-bottom: 10px;
    box-shadow: 0 4px 12px rgba(224,112,16,.25);
  }
  .brand-logo svg { width: 22px; height: 22px; fill: #fff; }
  .brand-name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
  .brand-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; font-weight: 500; }

  .card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1) .15s both;
  }

  .card-top {
    padding: 28px 28px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .order-label {
    font-size: 10px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px;
  }
  .order-number {
    font-size: 26px; font-weight: 800; color: var(--text);
    letter-spacing: -.03em; line-height: 1.1;
  }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 600;
    animation: pulseGlow 2.5s ease-in-out infinite;
  }
  .status-badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.8); }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,112,16,.15); }
    50% { box-shadow: 0 0 0 6px rgba(224,112,16,.05); }
  }

  .progress-section { padding: 24px 28px; }
  .progress-title {
    font-size: 10px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 20px;
  }

  .step-row {
    display: flex; align-items: flex-start; gap: 14px;
    position: relative; padding-bottom: 4px; margin-bottom: 4px;
    animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both;
  }
  .step-row:last-child { padding-bottom: 0; margin-bottom: 0; }
  .step-row:nth-child(1) { animation-delay: .25s; }
  .step-row:nth-child(2) { animation-delay: .32s; }
  .step-row:nth-child(3) { animation-delay: .39s; }
  .step-row:nth-child(4) { animation-delay: .46s; }
  .step-row:nth-child(5) { animation-delay: .53s; }
  .step-row:nth-child(6) { animation-delay: .60s; }

  .step-line {
    position: absolute; left: 15px; top: 32px; bottom: -4px;
    width: 2px; border-radius: 1px;
  }
  .step-row:last-child .step-line { display: none; }

  .step-circle {
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center; flex-shrink: 0;
    font-size: 13px; z-index: 2;
  }

  .step-info {
    padding-top: 5px; min-height: 44px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .step-label { font-size: 13.5px; font-weight: 600; line-height: 1.2; }
  .step-desc { font-size: 11px; margin-top: 2px; font-weight: 500; }

  /* States */
  .step-done .step-circle { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(224,112,16,.2); }
  .step-done .step-label { color: var(--text); }
  .step-done .step-line { background: var(--accent); }

  .step-current .step-circle { background: var(--accent); color: #fff; box-shadow: 0 0 0 4px var(--accent-light), 0 4px 12px rgba(224,112,16,.3); }
  .step-current .step-label { color: var(--accent-dark); font-weight: 700; }
  .step-current .step-desc { color: var(--accent); }
  .step-current .step-line { background: linear-gradient(to bottom, var(--accent), #e0e0e0); }

  .step-pending .step-circle { background: var(--bg); border: 2px solid #e0e0e0; color: #ccc; }
  .step-pending .step-label { color: #c0c0c0; }
  .step-pending .step-line { background: #e8e8e8; }

  .step-delivered .step-circle { background: var(--green); color: #fff; box-shadow: 0 0 0 4px var(--green-bg), 0 4px 12px rgba(26,154,92,.25); }
  .step-delivered .step-label { color: var(--green); font-weight: 700; }
  .step-delivered .step-desc { color: var(--green); }

  .info-section { padding: 0 28px 24px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-box {
    background: var(--bg); padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--border);
  }
  .info-box.full { grid-column: 1 / -1; }
  .info-label {
    font-size: 9px; font-weight: 700; color: var(--text-3);
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;
  }
  .info-value { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }

  .wa-section { padding: 0 28px 28px; }
  .btn-wa {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 15px 20px;
    background: var(--text); color: #fff; border: none; border-radius: 14px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; text-decoration: none; transition: all .2s; letter-spacing: -.01em;
  }
  .btn-wa:hover { background: #333; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
  .btn-wa:active { transform: scale(.98); }
  .btn-wa svg { width: 18px; height: 18px; fill: #25D366; }

  .page-footer {
    text-align: center; margin-top: 20px;
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1) .3s both;
  }
  .footer-text { font-size: 10px; color: var(--text-3); font-weight: 500; }

  .loading-card { padding: 50px 28px; text-align: center; }
  .loader {
    width: 36px; height: 36px;
    border: 3px solid var(--accent-light); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-3); font-weight: 500; }

  .error-card { padding: 44px 28px; text-align: center; }
  .error-icon {
    width: 56px; height: 56px; background: #fef2f2; border-radius: 50%;
    display: inline-grid; place-items: center; font-size: 24px; margin-bottom: 16px;
  }
  .error-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .error-msg { font-size: 13px; color: var(--text-2); line-height: 1.5; }
  .error-code {
    display: inline-block; margin-top: 12px; padding: 5px 12px;
    background: var(--bg); border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--text-2); border: 1px solid var(--border);
  }
</style>
</head>
<body>

  <div class="page-wrapper">
    <div class="brand-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="brand-name">Origami Decoprint</div>
      <div class="brand-sub">Seguimiento de pedido</div>
    </div>

    <div class="card" id="tracking-card">
      <div class="loading-card">
        <div class="loader"></div>
        <div class="loading-text">Buscando tu pedido…</div>
      </div>
    </div>

    <div class="page-footer">
      <div class="footer-text">Origami Decoprint · Sistema de Gestión</div>
    </div>
  </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBNXoG6NqK_FkIIfmHqP7O2y9P_K4g0uM",
  authDomain: "origamidecoprint.firebaseapp.com",
  projectId: "origamidecoprint",
  storageBucket: "origamidecoprint.appspot.com",
  messagingSenderId: "619077977462",
  appId: "1:619077977462:web:75a2d600b34383187c331a"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const auth = getAuth(app);

const STEPS = [
  { key:'pendiente',     label:'Recibido',   icon:'📋', desc:'Pedido registrado en el sistema' },
  { key:'en_diseño',     label:'En Diseño',  icon:'🎨', desc:'Estamos creando tu diseño' },
  { key:'aprobado',      label:'Aprobado',   icon:'✅', desc:'Diseño confirmado por el cliente' },
  { key:'en_produccion', label:'Producción', icon:'🖨️', desc:'Tu pedido está en la imprenta' },
  { key:'listo',         label:'Listo',      icon:'📦', desc:'¡Listo para retirar!' },
  { key:'entregado',     label:'Entregado',  icon:'🎉', desc:'Pedido entregado con éxito' }
];

function getStatusBadge(statusKey, currentIdx) {
  if (statusKey === 'entregado') {
    return '<div class="status-badge" style="background:var(--green-bg);color:var(--green);"><span class="dot" style="background:var(--green);"></span> Entregado</div>';
  }
  const step = STEPS[currentIdx] || STEPS[0];
  return '<div class="status-badge" style="background:var(--accent-light);color:var(--accent-dark);"><span class="dot" style="background:var(--accent);"></span> ' + step.label + '</div>';
}

function getStepClass(i, currentIdx, statusKey) {
  if (statusKey === 'entregado') return i === STEPS.length - 1 ? 'step-delivered' : 'step-done';
  if (i < currentIdx) return 'step-done';
  if (i === currentIdx) return 'step-current';
  return 'step-pending';
}

async function buscarPedido() {
  const params = new URLSearchParams(window.location.search);
  const trackIdURL = params.get('track');
  const card = document.getElementById('tracking-card');

  if (!trackIdURL) {
    card.innerHTML = '<div class="error-card"><div class="error-icon">⚠️</div><div class="error-title">Enlace no válido</div><div class="error-msg">Este enlace no contiene un código de seguimiento. Verifica que el link esté completo.</div></div>';
    return;
  }

  try {
    // Autenticación anónima para que Firestore permita la lectura
    await signInAnonymously(auth);
    console.log('Auth anónima: OK');

    const buscado = trackIdURL.trim().toLowerCase();
    let order = null;

    // Buscar en ambas colecciones: orders y pedidos
    const colecciones = ['orders', 'pedidos'];
    
    console.log('=== DIAGNÓSTICO RASTREO ===');
    console.log('Buscando código:', buscado);

    for (const col of colecciones) {
      try {
        const snap = await getDocs(collection(db, col));
        console.log('Colección "' + col + '": ' + snap.size + ' documentos');
        
        snap.forEach(doc => {
          const data = doc.data();
          const idEnDB = (data.trackingId || data.trackId || data.trackid || "").toString().trim().toLowerCase();
          console.log('[' + col + '] Doc:', doc.id, '| trackingId:', data.trackingId, '| trackId:', data.trackId, '| Comparando:', idEnDB, '===', buscado);
          if (idEnDB === buscado) order = { id: doc.id, ...data };
        });

        if (order) break;
      } catch(colErr) {
        console.warn('No se pudo leer colección "' + col + '":', colErr.code || colErr.message);
      }
    }

    console.log('Pedido encontrado:', order ? 'SÍ (' + order.id + ')' : 'NO');
    console.log('=== FIN DIAGNÓSTICO ===');

    if (!order) {
      card.innerHTML = '<div class="error-card"><div class="error-icon">🔍</div><div class="error-title">Pedido no encontrado</div><div class="error-msg">No encontramos un pedido asociado a este código. Si crees que es un error, contáctanos por WhatsApp.</div><div class="error-code">' + trackIdURL + '</div></div>';
      return;
    }

    const statusKey = order.status || 'pendiente';
    const currentIdx = Math.max(0, STEPS.findIndex(s => s.key === statusKey));

    let dateStr = 'Hoy';
    if (order.updatedAt) {
      dateStr = new Date(order.updatedAt).toLocaleDateString('es-VE', { day:'2-digit', month:'short', year:'numeric' });
    }

    let stepsHtml = '';
    for (let i = 0; i < STEPS.length; i++) {
      const step = STEPS[i];
      const cls = getStepClass(i, currentIdx, statusKey);
      const icon = (cls === 'step-done') ? '✓' : step.icon;
      const showDesc = (cls === 'step-current' || cls === 'step-delivered');
      stepsHtml += '<div class="step-row ' + cls + '">' +
        '<div class="step-line"></div>' +
        '<div class="step-circle">' + icon + '</div>' +
        '<div class="step-info">' +
          '<div class="step-label">' + step.label + '</div>' +
          (showDesc ? '<div class="step-desc">' + step.desc + '</div>' : '') +
        '</div></div>';
    }

    // WhatsApp link
    let phone = (order.clientPhone || '').replace(/[^0-9]/g, '');
    if (phone.startsWith('0')) phone = phone.substring(1);
    if (!phone.startsWith('58')) phone = '58' + phone;
    const waText = encodeURIComponent('Hola! Consulto por mi pedido ' + (order.orderNumStr || ''));
    const waLink = 'https://wa.me/' + phone + '?text=' + waText;

    card.innerHTML = 
      '<div class="card-top">' +
        '<div class="order-label">Pedido</div>' +
        '<div class="order-number">' + (order.orderNumStr || order.quoteNumStr || '#---') + '</div>' +
        getStatusBadge(statusKey, currentIdx) +
      '</div>' +

      '<div class="progress-section">' +
        '<div class="progress-title">Progreso</div>' +
        stepsHtml +
      '</div>' +

      '<div class="info-section"><div class="info-grid">' +
        '<div class="info-box"><div class="info-label">Cliente</div><div class="info-value">' + (order.clientName || 'Cliente') + '</div></div>' +
        '<div class="info-box"><div class="info-label">Actualización</div><div class="info-value">' + dateStr + '</div></div>' +
        (order.detail ? '<div class="info-box full"><div class="info-label">Detalle</div><div class="info-value" style="font-size:13px;font-weight:500;color:var(--text-2);">' + order.detail + '</div></div>' : '') +
      '</div></div>' +

      '<div class="wa-section">' +
        '<a href="' + waLink + '" target="_blank" class="btn-wa">' +
          '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.612.638l4.728-1.396A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.37 0-4.567-.813-6.3-2.175l-.44-.35-3.19.942.866-3.264-.372-.464A9.96 9.96 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>' +
          'Contactar al Taller' +
        '</a>' +
      '</div>';

  } catch(e) {
    console.error("Error cargando pedido:", e);
    console.error("Código del error:", e.code);
    console.error("Mensaje:", e.message);
    card.innerHTML = '<div class="error-card"><div class="error-icon">⚡</div><div class="error-title">Error de conexión</div><div class="error-msg">No pudimos conectar con el servidor. Intenta nuevamente en unos segundos.</div><div class="error-code" style="margin-top:8px;font-size:11px;">' + (e.code || e.message || 'Error desconocido') + '</div></div>';
  }
}

buscarPedido();
</script>
</body>
</html>

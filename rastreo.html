<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico | Origami</title>
<style>
  body { background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 20px; }
  .debug-box { border: 1px solid #00ff00; padding: 15px; margin-top: 20px; background: #000; }
  .card { background: white; color: black; padding: 20px; border-radius: 10px; font-family: sans-serif; }
</style>
</head>
<body>
  <div id="status">⏳ Iniciando diagnóstico...</div>
  <div id="debug-info" class="debug-box"></div>
  <div id="final-view" style="margin-top:20px"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBvwQDX5WBpsm0npODCn58-Kia7t_MqrYc",
  authDomain: "appcurso-ff7ab.firebaseapp.com",
  projectId: "appcurso-ff7ab",
  storageBucket: "appcurso-ff7ab.firebasestorage.app",
  messagingSenderId: "646086143183",
  appId: "1:646086143183:web:2136f14c494bd2b99b1bba"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const debugDiv = document.getElementById('debug-info');
const statusDiv = document.getElementById('status');

async function diagnostico() {
    const params = new URLSearchParams(window.location.search);
    const trackIdURL = params.get('track');
    
    debugDiv.innerHTML += `> Buscando código: [${trackIdURL}]<br>`;
    
    try {
        statusDiv.innerText = "📡 Conectando a la colección 'orders'...";
        const snap = await getDocs(collection(db, 'orders'));
        
        debugDiv.innerHTML += `> Pedidos totales encontrados en la DB: ${snap.docs.length}<br>`;
        
        if (snap.empty) {
            debugDiv.innerHTML += `> <span style="color:red">ERROR: La carpeta 'orders' está vacía o no existe.</span><br>`;
        }

        let encontrado = null;
        snap.forEach(doc => {
            const data = doc.data();
            const idEnDB = data.trackId || data.trackid || "SIN_ID";
            
            // Logueamos los IDs que vamos encontrando para ver por qué no coinciden
            debugDiv.innerHTML += `> Revisando Doc: ${doc.id} | trackId en DB: [${idEnDB}]<br>`;
            
            if (String(idEnDB).trim().toLowerCase() === String(trackIdURL).trim().toLowerCase()) {
                encontrado = { id: doc.id, ...data };
            }
        });

        if (encontrado) {
            statusDiv.innerText = "✅ ¡PEDIDO ENCONTRADO!";
            document.getElementById('final-view').innerHTML = `
                <div class="card">
                    <h3>${encontrado.clientName}</h3>
                    <p>Estatus: ${encontrado.status}</p>
                    <p>Pedido: ${encontrado.orderNumStr || encontrado.quoteNumStr || 'S/N'}</p>
                </div>
            `;
        } else {
            statusDiv.innerText = "❌ Pedido no coincide con ninguno en la lista.";
        }

    } catch (e) {
        debugDiv.innerHTML += `> <span style="color:red">ERROR CRÍTICO: ${e.message}</span><br>`;
        statusDiv.innerText = "💥 Error de conexión.";
    }
}

diagnostico();
</script>
</body>
</html>

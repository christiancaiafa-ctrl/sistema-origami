<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Pedido | Origami Decoprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1fa;
    --card: #ffffff;
    --purple: #7B68AE;
    --purple-dark: #5A4690;
    --purple-deep: #3E2D6B;
    --purple-light: #eee8f8;
    --purple-glow: rgba(123,104,174,.15);
    --magenta: #E91E8C;
    --magenta-light: rgba(233,30,140,.08);
    --green: #39D52D;
    --green-dark: #2BB524;
    --green-light: rgba(57,213,45,.08);
    --orange: #F5A623;
    --orange-light: rgba(245,166,35,.08);
    --text: #1a1a2e;
    --text-2: #555568;
    --text-3: #9a9aad;
    --border: rgba(123,104,174,.1);
    --shadow: 0 8px 40px rgba(90,70,144,.1);
    --shadow-lg: 0 20px 60px rgba(90,70,144,.14);
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: var(--font);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* Origami-inspired geometric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 10%, rgba(123,104,174,.12) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 20%, rgba(233,30,140,.07) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 90%, rgba(57,213,45,.06) 0%, transparent 40%),
      radial-gradient(ellipse at 80% 70%, rgba(245,166,35,.06) 0%, transparent 35%);
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative geometric shapes - origami style */
  body::after {
    content: '';
    position: fixed;
    width: 300px; height: 300px;
    top: -80px; right: -60px;
    background: linear-gradient(135deg, rgba(123,104,174,.06) 0%, rgba(233,30,140,.04) 100%);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    pointer-events: none;
    z-index: 0;
    animation: floatGeo 12s ease-in-out infinite;
  }

  @keyframes floatGeo {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    50% { transform: rotate(8deg) translateY(10px); }
  }

  .geo-deco {
    position: fixed;
    pointer-events: none;
    z-index: 0;
  }
  .geo-deco-1 {
    width: 180px; height: 180px;
    bottom: -40px; left: -30px;
    background: linear-gradient(45deg, rgba(57,213,45,.06), rgba(245,166,35,.05));
    clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
    animation: floatGeo 15s ease-in-out infinite reverse;
  }
  .geo-deco-2 {
    width: 100px; height: 100px;
    top: 30%; left: 5%;
    background: rgba(245,166,35,.05);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    animation: floatGeo 10s ease-in-out 2s infinite;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    animation: fadeUp .7s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.92); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Brand Header */
  .brand-header {
    text-align: center;
    margin-bottom: 18px;
    animation: fadeUp .7s cubic-bezier(.22,1,.36,1) .1s both;
  }
  .brand-logo {
    width: 64px; height: 64px;
    border-radius: 16px;
    display: inline-block;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(90,70,144,.2);
    border: 2px solid rgba(255,255,255,.8);
  }
  .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
  .brand-name {
    font-size: 16px; font-weight: 800; letter-spacing: -.03em;
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--magenta) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-sub {
    font-size: 11px; color: var(--text-3); margin-top: 3px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase;
  }

  /* Main Card */
  .card {
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    border: 1px solid rgba(123,104,174,.08);
    animation: scaleIn .6s cubic-bezier(.22,1,.36,1) .2s both;
    position: relative;
  }

  /* Card Top - Purple gradient header */
  .card-top {
    padding: 30px 28px 26px;
    text-align: center;
    background: linear-gradient(145deg, var(--purple) 0%, var(--purple-dark) 60%, var(--purple-deep) 100%);
    position: relative;
    overflow: hidden;
  }
  .card-top::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    top: -80px; right: -60px;
    background: rgba(233,30,140,.12);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    animation: floatGeo 8s ease-in-out infinite;
  }
  .card-top::after {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    bottom: -40px; left: -20px;
    background: rgba(57,213,45,.1);
    clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
    animation: floatGeo 10s ease-in-out 1s infinite reverse;
  }
  .order-label {
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,.6);
    text-transform: uppercase; letter-spacing: .15em; margin-bottom: 6px;
    position: relative; z-index: 1;
  }
  .order-number {
    font-size: 30px; font-weight: 900; color: #fff;
    letter-spacing: -.03em; line-height: 1.1;
    position: relative; z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .status-badge {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 16px; padding: 7px 16px; border-radius: 100px;
    font-size: 12px; font-weight: 700;
    position: relative; z-index: 1;
    backdrop-filter: blur(8px);
    animation: pulseGlow 2.5s ease-in-out infinite;
  }
  .status-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-in-progress {
    background: rgba(255,255,255,.2); color: #fff;
    border: 1px solid rgba(255,255,255,.25);
  }
  .status-in-progress .dot { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .status-delivered {
    background: rgba(57,213,45,.2); color: #fff;
    border: 1px solid rgba(57,213,45,.35);
  }
  .status-delivered .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .6; transform: scale(.75); }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.1); }
    50% { box-shadow: 0 0 0 8px rgba(255,255,255,.03); }
  }

  /* Progress Section */
  .progress-section { padding: 26px 28px; }
  .progress-title {
    font-size: 10px; font-weight: 800; color: var(--purple);
    text-transform: uppercase; letter-spacing: .12em; margin-bottom: 22px;
    display: flex; align-items: center; gap: 8px;
  }
  .progress-title::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(to right, var(--purple-glow), transparent);
  }

  .step-row {
    display: flex; align-items: flex-start; gap: 16px;
    position: relative; padding-bottom: 6px; margin-bottom: 6px;
    animation: fadeUp .4s cubic-bezier(.22,1,.36,1) both;
  }
  .step-row:last-child { padding-bottom: 0; margin-bottom: 0; }
  .step-row:nth-child(1) { animation-delay: .3s; }
  .step-row:nth-child(2) { animation-delay: .38s; }
  .step-row:nth-child(3) { animation-delay: .46s; }
  .step-row:nth-child(4) { animation-delay: .54s; }
  .step-row:nth-child(5) { animation-delay: .62s; }
  .step-row:nth-child(6) { animation-delay: .70s; }

  .step-line {
    position: absolute; left: 17px; top: 36px; bottom: -6px;
    width: 2.5px; border-radius: 2px;
  }
  .step-row:last-child .step-line { display: none; }

  .step-circle {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center; flex-shrink: 0;
    font-size: 14px; z-index: 2;
    transition: all .3s cubic-bezier(.22,1,.36,1);
  }

  .step-info {
    padding-top: 6px; min-height: 48px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .step-label { font-size: 14px; font-weight: 700; line-height: 1.2; letter-spacing: -.01em; }
  .step-desc { font-size: 11.5px; margin-top: 3px; font-weight: 500; line-height: 1.3; }

  /* Step States */
  .step-done .step-circle {
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
    color: #fff;
    box-shadow: 0 3px 10px rgba(123,104,174,.3);
  }
  .step-done .step-label { color: var(--text); }
  .step-done .step-desc { color: var(--text-2); }
  .step-done .step-line {
    background: linear-gradient(to bottom, var(--purple), var(--purple));
  }

  .step-current .step-circle {
    background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 100%);
    color: #fff;
    box-shadow: 0 0 0 5px var(--magenta-light), 0 4px 16px rgba(233,30,140,.3);
    animation: currentPulse 2.5s ease-in-out infinite;
  }
  @keyframes currentPulse {
    0%, 100% { box-shadow: 0 0 0 5px var(--magenta-light), 0 4px 16px rgba(233,30,140,.3); }
    50% { box-shadow: 0 0 0 8px rgba(233,30,140,.06), 0 4px 20px rgba(233,30,140,.2); }
  }
  .step-current .step-label { color: var(--magenta); font-weight: 800; }
  .step-current .step-desc { color: var(--purple); }
  .step-current .step-line {
    background: linear-gradient(to bottom, var(--magenta), rgba(200,200,210,.3));
  }

  .step-pending .step-circle {
    background: var(--bg); border: 2.5px solid rgba(123,104,174,.15); color: var(--text-3);
  }
  .step-pending .step-label { color: var(--text-3); }
  .step-pending .step-line { background: rgba(123,104,174,.1); }

  .step-delivered .step-circle {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
    color: #fff;
    box-shadow: 0 0 0 5px var(--green-light), 0 4px 16px rgba(57,213,45,.3);
  }
  .step-delivered .step-label { color: var(--green-dark); font-weight: 800; }
  .step-delivered .step-desc { color: var(--green); }

  /* Info Section */
  .info-section { padding: 0 28px 24px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-box {
    background: var(--bg); padding: 14px 16px; border-radius: 14px;
    border: 1px solid var(--border);
    transition: all .2s;
  }
  .info-box:hover { border-color: rgba(123,104,174,.2); }
  .info-box.full { grid-column: 1 / -1; }
  .info-label {
    font-size: 9px; font-weight: 800; color: var(--purple);
    text-transform: uppercase; letter-spacing: .12em; margin-bottom: 5px;
  }
  .info-value { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }

  /* WhatsApp Button */
  .wa-section { padding: 0 28px 28px; }
  .btn-wa {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px 20px;
    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
    color: #fff; border: none; border-radius: 16px;
    font-size: 14px; font-weight: 700; font-family: inherit;
    cursor: pointer; text-decoration: none;
    transition: all .25s cubic-bezier(.22,1,.36,1);
    letter-spacing: -.01em;
    box-shadow: 0 4px 16px rgba(90,70,144,.25);
    position: relative;
    overflow: hidden;
  }
  .btn-wa::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(233,30,140,.15) 100%);
    opacity: 0;
    transition: opacity .3s;
  }
  .btn-wa:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(90,70,144,.35);
  }
  .btn-wa:hover::before { opacity: 1; }
  .btn-wa:active { transform: scale(.98); }
  .btn-wa svg { width: 20px; height: 20px; fill: #25D366; position: relative; z-index: 1; }
  .btn-wa span { position: relative; z-index: 1; }

  /* Footer */
  .page-footer {
    text-align: center; margin-top: 22px;
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1) .4s both;
  }
  .footer-text { font-size: 10px; color: var(--text-3); font-weight: 600; letter-spacing: .03em; }
  .footer-colors {
    display: flex; justify-content: center; gap: 5px; margin-top: 8px;
  }
  .footer-dot {
    width: 6px; height: 6px; border-radius: 50%;
    animation: dotPulse 3s ease-in-out infinite;
  }
  .footer-dot:nth-child(1) { background: var(--purple); animation-delay: 0s; }
  .footer-dot:nth-child(2) { background: var(--magenta); animation-delay: .5s; }
  .footer-dot:nth-child(3) { background: var(--green); animation-delay: 1s; }
  .footer-dot:nth-child(4) { background: var(--orange); animation-delay: 1.5s; }
  @keyframes dotPulse {
    0%, 100% { opacity: .4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* Loading */
  .loading-card { padding: 60px 28px; text-align: center; }
  .loader {
    width: 40px; height: 40px;
    border: 3px solid var(--purple-light);
    border-top-color: var(--purple);
    border-right-color: var(--magenta);
    border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-3); font-weight: 600; }
  .loading-dots::after {
    content: '';
    animation: loadDots 1.5s steps(4, end) infinite;
  }
  @keyframes loadDots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* Error */
  .error-card { padding: 48px 28px; text-align: center; }
  .error-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--purple-light), rgba(233,30,140,.08));
    border-radius: 50%;
    display: inline-grid; place-items: center; font-size: 26px; margin-bottom: 18px;
    border: 1px solid var(--border);
  }
  .error-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 8px; letter-spacing: -.02em; }
  .error-msg { font-size: 13px; color: var(--text-2); line-height: 1.6; max-width: 320px; margin: 0 auto; }
  .error-code {
    display: inline-block; margin-top: 14px; padding: 6px 14px;
    background: var(--bg); border-radius: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--purple); border: 1px solid var(--border);
  }

  /* Delivered celebration rainbow bar */
  .celebration {
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px; z-index: 10;
    background: linear-gradient(90deg, var(--purple), var(--magenta), var(--orange), var(--green), var(--purple));
    background-size: 300% 100%;
    animation: gradientSlide 3s ease infinite;
  }
  @keyframes gradientSlide {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @media (max-width: 480px) {
    .page-wrapper { max-width: 100%; }
    .card-top { padding: 24px 20px 22px; }
    .order-number { font-size: 24px; }
    .progress-section { padding: 22px 20px; }
    .info-section { padding: 0 20px 20px; }
    .wa-section { padding: 0 20px 24px; }
  }
</style>
</head>
<body>

  <div class="geo-deco geo-deco-1"></div>
  <div class="geo-deco geo-deco-2"></div>

  <div class="page-wrapper">
    <div class="brand-header">
      <div class="brand-logo">
        <img src="Logo.png" alt="Origami Decoprint">
      </div>
      <div class="brand-name">Origami Decoprint</div>
      <div class="brand-sub">Seguimiento de pedido</div>
    </div>

    <div class="card" id="tracking-card">
      <div class="loading-card">
        <div class="loader"></div>
        <div class="loading-text">Buscando tu pedido<span class="loading-dots"></span></div>
      </div>
    </div>

    <div class="page-footer">
      <div class="footer-text">Origami Decoprint · Sistema de Gestión</div>
      <div class="footer-colors">
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
        <div class="footer-dot"></div>
      </div>
    </div>
  </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBvwQDX5WBpsm0npODCn58-Kia7t_MqrYc",
  authDomain: "appcurso-ff7ab.firebaseapp.com",
  projectId: "appcurso-ff7ab",
  storageBucket: "appcurso-ff7ab.firebasestorage.app",
  messagingSenderId: "646086143183",
  appId: "1:646086143183:web:2136f14c494bd2b99b1bba"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);
const auth = getAuth(app);

const STEPS = [
  { key:'pendiente',     label:'Recibido',   icon:'📋', desc:'Pedido registrado en el sistema' },
  { key:'en_diseño',     label:'En Diseño',  icon:'🎨', desc:'Estamos creando tu diseño' },
  { key:'aprobado',      label:'Aprobado',   icon:'✅', desc:'Diseño confirmado por el cliente' },
  { key:'en_produccion', label:'Producción', icon:'🖨️', desc:'Tu pedido está en la imprenta' },
  { key:'listo',         label:'Listo',      icon:'📦', desc:'¡Listo para retirar!' },
  { key:'entregado',     label:'Entregado',  icon:'🎉', desc:'Pedido entregado con éxito' }
];

function getStatusBadge(statusKey, currentIdx) {
  if (statusKey === 'entregado') {
    return '<div class="status-badge status-delivered"><span class="dot"></span> Entregado</div>';
  }
  const step = STEPS[currentIdx] || STEPS[0];
  return '<div class="status-badge status-in-progress"><span class="dot"></span> ' + step.label + '</div>';
}

function getStepClass(i, currentIdx, statusKey) {
  if (statusKey === 'entregado') return i === STEPS.length - 1 ? 'step-delivered' : 'step-done';
  if (i < currentIdx) return 'step-done';
  if (i === currentIdx) return 'step-current';
  return 'step-pending';
}

async function buscarPedido() {
  const params = new URLSearchParams(window.location.search);
  const trackIdURL = params.get('track');
  const card = document.getElementById('tracking-card');

  if (!trackIdURL) {
    card.innerHTML = '<div class="error-card"><div class="error-icon">⚠️</div><div class="error-title">Enlace no válido</div><div class="error-msg">Este enlace no contiene un código de seguimiento. Verifica que el link esté completo.</div></div>';
    return;
  }

  try {
    await signInAnonymously(auth);

    const buscado = trackIdURL.trim().toLowerCase();
    let order = null;

    const colecciones = ['orders', 'pedidos'];

    for (const col of colecciones) {
      try {
        const snap = await getDocs(collection(db, col));
        
        snap.forEach(doc => {
          const data = doc.data();
          const idEnDB = (data.trackingId || data.trackId || data.trackid || "").toString().trim().toLowerCase();
          if (idEnDB === buscado) order = { id: doc.id, ...data };
        });

        if (order) break;
      } catch(colErr) {}
    }

    if (!order) {
      card.innerHTML = '<div class="error-card"><div class="error-icon">🔍</div><div class="error-title">Pedido no encontrado</div><div class="error-msg">No encontramos un pedido asociado a este código. Si crees que es un error, contáctanos por WhatsApp.</div><div class="error-code">' + trackIdURL + '</div></div>';
      return;
    }

    const statusKey = order.status || 'pendiente';
    const currentIdx = Math.max(0, STEPS.findIndex(s => s.key === statusKey));
    const isDelivered = statusKey === 'entregado';

    let dateStr = 'Hoy';
    if (order.updatedAt) {
      dateStr = new Date(order.updatedAt).toLocaleDateString('es-VE', { day:'2-digit', month:'short', year:'numeric' });
    }

    let stepsHtml = '';
    for (let i = 0; i < STEPS.length; i++) {
      const step = STEPS[i];
      const cls = getStepClass(i, currentIdx, statusKey);
      const icon = (cls === 'step-done') ? '✓' : step.icon;
      const showDesc = (cls === 'step-current' || cls === 'step-delivered');
      stepsHtml += '<div class="step-row ' + cls + '">' +
        '<div class="step-line"></div>' +
        '<div class="step-circle">' + icon + '</div>' +
        '<div class="step-info">' +
          '<div class="step-label">' + step.label + '</div>' +
          (showDesc ? '<div class="step-desc">' + step.desc + '</div>' : '') +
        '</div></div>';
    }

    const waText = encodeURIComponent('Hola! Consulto por mi pedido ' + (order.orderNumStr || ''));
    const waLink = 'https://wa.me/584142527314?text=' + waText;

    card.innerHTML = 
      (isDelivered ? '<div class="celebration"></div>' : '') +
      '<div class="card-top">' +
        '<div class="order-label">Pedido</div>' +
        '<div class="order-number">' + (order.orderNumStr || order.quoteNumStr || '#---') + '</div>' +
        getStatusBadge(statusKey, currentIdx) +
      '</div>' +

      '<div class="progress-section">' +
        '<div class="progress-title">Progreso</div>' +
        stepsHtml +
      '</div>' +

      '<div class="info-section"><div class="info-grid">' +
        '<div class="info-box"><div class="info-label">Cliente</div><div class="info-value">' + (order.clientName || 'Cliente') + '</div></div>' +
        '<div class="info-box"><div class="info-label">Actualización</div><div class="info-value">' + dateStr + '</div></div>' +
        (order.detail ? '<div class="info-box full"><div class="info-label">Detalle</div><div class="info-value" style="font-size:13px;font-weight:600;color:var(--text-2);">' + order.detail + '</div></div>' : '') +
      '</div></div>' +

      '<div class="wa-section">' +
        '<a href="' + waLink + '" target="_blank" class="btn-wa">' +
          '<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.612.638l4.728-1.396A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.37 0-4.567-.813-6.3-2.175l-.44-.35-3.19.942.866-3.264-.372-.464A9.96 9.96 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>' +
          '<span>Contactar la Tienda</span>' +
        '</a>' +
      '</div>';

  } catch(e) {
    card.innerHTML = '<div class="error-card"><div class="error-icon">⚡</div><div class="error-title">Error de conexión</div><div class="error-msg">No pudimos conectar con el servidor. Intenta nuevamente en unos segundos.</div></div>';
  }
}

buscarPedido();
</script>
